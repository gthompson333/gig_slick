<span class="px-4 py-2 bg-surface-container-highest text-on-surface rounded-full text-sm font-semibold transition-colors hover:bg-surface-bright cursor-pointer">Electronic</span>

<div class="space-y-2">

<input class="bg-transparent border-none p-0 w-full text-on-surface font-bold focus:ring-0" type="text" value="9:00 PM"/>
</div>
</div>

<div>
